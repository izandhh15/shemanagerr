services:
  - type: web
    name: shemanager
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: SheManager
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_LOCALE
        value: es
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: shemanager
          property: hostURL
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: shemanager-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: BETA_MODE
        value: false
      - key: ALLOW_NEW_SEASON
        value: true
      - key: PORT
        value: 8080

databases:
  - name: shemanager-db
    plan: free
    region: frankfurt
    databaseName: shemanager
    user: shemanager
